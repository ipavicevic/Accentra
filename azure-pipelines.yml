trigger:
  branches:
    exclude:
      - '*'
  tags:
    include:
      - 'v*'

pr: none

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  rid: 'win-x64'

steps:
- pwsh: |
    $version = "$(Build.SourceBranchName)".TrimStart('v')
    Write-Host "##vso[task.setvariable variable=AppVersion]$version"
    Write-Host "Version: $version"
  displayName: 'Extract version from tag'

- task: UseDotNet@2
  displayName: 'Use .NET 8 SDK'
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: >
    dotnet publish Accentra.csproj
    -c $(buildConfiguration)
    -r $(rid)
    --self-contained true
    -p:PublishSingleFile=true
    -p:IncludeNativeLibrariesForSelfExtract=true
    -p:Version=$(AppVersion)
    -o $(Build.ArtifactStagingDirectory)\publish
  displayName: 'Publish self-contained EXE'

- pwsh: |
    $publish = "$(Build.ArtifactStagingDirectory)\publish"
    $zipPath = "$(Build.ArtifactStagingDirectory)\Accentra.zip"
    Compress-Archive -Path "$publish\Accentra.exe","$publish\accent-maps.json" `
                     -DestinationPath $zipPath -Force
    Write-Host "Created $zipPath"
  displayName: 'Bundle EXE + JSON into ZIP'

- task: PublishBuildArtifacts@1
  displayName: 'Publish artifact'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)\Accentra.zip'
    ArtifactName: 'Accentra-$(AppVersion)'
    publishLocation: 'Container'

- pwsh: |
    $headers = @{
      Authorization = "Bearer $(GITHUB_PAT)"
      Accept        = 'application/vnd.github+json'
    }
    $repo = 'ipavicevic/Accentra'
    $tag  = "v$(AppVersion)"

    # Get existing release for this tag, or create one
    try {
      $release = Invoke-RestMethod `
        -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" `
        -Method Get -Headers $headers
      Write-Host "Reusing existing release id=$($release.id)"
    } catch {
      $body = @{
        tag_name = $tag
        name     = "Accentra $tag"
        body     = "Download ``Accentra.zip``, extract it, then run ``Accentra.exe`` once — it installs itself and starts with Windows."
        draft    = $false
        prerelease = $false
      } | ConvertTo-Json

      $release = Invoke-RestMethod `
        -Uri "https://api.github.com/repos/$repo/releases" `
        -Method Post -Headers $headers -Body $body -ContentType 'application/json'
      Write-Host "Created release id=$($release.id)"
    }

    function Upload-Asset($localPath, $assetName, $contentType) {
      # Delete existing asset of the same name
      $existing = $release.assets | Where-Object { $_.name -eq $assetName }
      if ($existing) {
        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$repo/releases/assets/$($existing.id)" `
          -Method Delete -Headers $headers | Out-Null
        Write-Host "Deleted existing asset $assetName"
      }
      $uploadUrl = $release.upload_url -replace '\{\?name,label\}', "?name=$assetName"
      Invoke-RestMethod `
        -Uri $uploadUrl -Method Post -Headers $headers `
        -InFile $localPath -ContentType $contentType | Out-Null
      Write-Host "Uploaded $assetName"
    }

    Upload-Asset "$(Build.ArtifactStagingDirectory)\Accentra.zip" 'Accentra.zip' 'application/zip'

    Write-Host "Published to https://github.com/$repo/releases/tag/$tag"
  displayName: 'Publish to GitHub Releases'
  env:
    GITHUB_PAT: $(GITHUB_PAT)

- pwsh: |
    $headers = @{
      Authorization = "Bearer $(GITHUB_PAT)"
      Accept        = 'application/vnd.github+json'
    }

    function Push-File($localPath, $repoPath) {
      $content = [Convert]::ToBase64String([IO.File]::ReadAllBytes($localPath))
      $uri = "https://api.github.com/repos/ipavicevic/Accentra/contents/$repoPath"

      # Get current SHA if file already exists (needed for updates)
      $sha = $null
      try {
        $existing = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get
        $sha = $existing.sha
      } catch {}

      $body = @{ message = "docs: update landing page [skip ci]"; content = $content }
      if ($sha) { $body.sha = $sha }

      Invoke-RestMethod -Uri $uri -Method Put -Headers $headers `
        -Body ($body | ConvertTo-Json) -ContentType 'application/json' | Out-Null
      Write-Host "Pushed $repoPath"
    }

    Push-File "$(Build.SourcesDirectory)\docs\index.html" "docs/index.html"
    Write-Host "Landing page updated: https://ipavicevic.github.io/Accentra"
  displayName: 'Push landing page to GitHub'
  env:
    GITHUB_PAT: $(GITHUB_PAT)

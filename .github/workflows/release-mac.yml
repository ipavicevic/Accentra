name: Release macOS

# Cut a macOS release by pushing a tag like `mac-v1.0.0`.
# Builds both architectures, signs with Developer ID, notarizes, and publishes
# a GitHub Release with the two zips. Independent of the Windows release.yml
# (which triggers on pushes to main and keys off Accentra.csproj).

on:
  push:
    tags:
      - 'mac-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KP=$(uuidgen)
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          # Put our keychain first in the search list so codesign finds the identity
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN"

      - name: Store notarization credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials accentra-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build, sign, and notarize (both architectures)
        env:
          NOTARY_PROFILE: accentra-notary
        run: |
          IDENTITY="Developer ID Application: Ivan Pavicevic (${{ secrets.NOTARY_TEAM_ID }})"
          Accentra.Mac/packaging/package-mac.sh osx-arm64 "$IDENTITY"
          Accentra.Mac/packaging/package-mac.sh osx-x64   "$IDENTITY"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(sed -n 's/.*<FileVersion>\(.*\)<\/FileVersion>.*/\1/p' Accentra.Mac/Accentra.Mac.csproj)
          gh release create "${{ github.ref_name }}" Accentra.Mac/dist/*.dmg \
            --title "Accentra for Mac $VERSION" \
            --notes "Signed and notarized macOS build. Install with Homebrew (\`brew install --cask accentra\`) or download the DMG for your architecture and drag Accentra into Applications."

      # Skips itself for dev/test versions (X.Y.Z.N) -- only a clean release
      # version (X.Y.Z, the 4th part dropped per the versioning policy before
      # tagging) updates the public cask. Regenerates the cask file fresh from
      # a template rather than sed-patching it in place, to avoid the empty-cask
      # failure mode a partial patch can produce if a prior step didn't run.
      - name: Bump Homebrew cask
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          VERSION=$(sed -n 's/.*<FileVersion>\(.*\)<\/FileVersion>.*/\1/p' Accentra.Mac/Accentra.Mac.csproj)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version $VERSION carries a dev/test 4th part -- skipping cask bump."
            exit 0
          fi

          ARM_SHA=$(shasum -a 256 "Accentra.Mac/dist/Accentra-$VERSION-arm64.dmg" | cut -d' ' -f1)
          X64_SHA=$(shasum -a 256 "Accentra.Mac/dist/Accentra-$VERSION-x64.dmg" | cut -d' ' -f1)

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/homebrew_tap_deploy
          chmod 600 ~/.ssh/homebrew_tap_deploy
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/homebrew_tap_deploy -o IdentitiesOnly=yes"

          git clone git@github.com:ipavicevic/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/accentra.rb << CASK
          cask "accentra" do
            arch arm: "arm64", intel: "x64"

            version "$VERSION"
            sha256 arm:   "$ARM_SHA",
                   intel: "$X64_SHA"

            url "https://github.com/ipavicevic/Accentra/releases/download/mac-v#{version}/Accentra-#{version}-#{arch}.dmg"
            name "Accentra"
            desc "Type accented characters by holding a key and cycling through variants"
            homepage "https://ipavicevic.github.io/Accentra/mac.html"

            depends_on macos: :ventura

            app "Accentra.app"

            caveats <<~CAVEATS
              Accentra needs Accessibility permission to intercept keystrokes.
              On first launch, enable Accentra in:
                System Settings → Privacy & Security → Accessibility
              Accentra activates itself the moment you flip the switch — no relaunch needed.
            CAVEATS

            zap trash: [
              "~/Library/Application Support/Accentra",
              "~/Library/LaunchAgents/com.accentra.Accentra.plist",
            ]
          end
          CASK

          git config user.name "accentra-release-bot"
          git config user.email "accentra-release-bot@users.noreply.github.com"
          git add Casks/accentra.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "Update accentra to $VERSION"
            git push origin main
          fi

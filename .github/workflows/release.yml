name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $v = (Select-Xml -Path Accentra.csproj -XPath '//Version').Node.InnerText
          echo "value=$v" >> $env:GITHUB_OUTPUT
          $parts = ($v -split '-')[0] -split '\.'
          while ($parts.Count -lt 4) { $parts += '0' }
          echo "msix=$($parts[0..3] -join '.')" >> $env:GITHUB_OUTPUT
          echo "tag=v$v" >> $env:GITHUB_OUTPUT

      - name: Skip if already released
        id: check
        shell: pwsh
        run: |
          $exists = git tag -l "${{ steps.version.outputs.tag }}"
          if ($exists) {
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish EXE
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          dotnet publish Accentra.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.value }} `
            -o publish

      - name: Generate store assets
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: .\generate-store-assets.ps1

      - name: Prepare MSIX layout
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force msix-layout | Out-Null
          Copy-Item publish\Accentra.exe msix-layout\
          (Get-Content Package.appxmanifest) `
            -replace 'Version="0\.0\.0\.0"', 'Version="${{ steps.version.outputs.msix }}"' |
            Set-Content msix-layout\AppxManifest.xml
          Copy-Item -Recurse Assets msix-layout\

      - name: Build MSIX
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
                 Where-Object { $_.Name -match '^\d' } | Sort-Object Name | Select-Object -Last 1
          & "$($sdk.FullName)\x64\makeappx.exe" pack /d msix-layout /p publish\Accentra.msix /o

      - name: Sign MSIX
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERT }}")
          [IO.File]::WriteAllBytes("accentra.pfx", $pfxBytes)
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
                 Where-Object { $_.Name -match '^\d' } | Sort-Object Name | Select-Object -Last 1
          & "$($sdk.FullName)\x64\signtool.exe" sign /fd sha256 /f accentra.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" publish\Accentra.msix
          Copy-Item publish\Accentra.msix "publish\Accentra-${{ steps.version.outputs.tag }}.msix"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Accentra ${{ steps.version.outputs.tag }}
          body: |
            **Test build — signed with a self-signed certificate.**

            To install:
            1. Enable Developer Mode: Windows Settings → System → For developers
            2. Double-click `Accentra.msix`
          files: |
            publish/Accentra.msix
            publish/Accentra-${{ steps.version.outputs.tag }}.msix

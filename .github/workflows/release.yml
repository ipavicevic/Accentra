name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}'.TrimStart('v')
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Accentra.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.value }} `
            -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Accentra ${{ github.ref_name }}
          body: "Download `Accentra.exe` and run it once — it installs itself and starts with Windows."
          files: publish/Accentra.exe
